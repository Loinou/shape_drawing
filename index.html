<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LetterDraw</title>
  <link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="notebook" id="notebook">
  <!-- Ruled lines drawn by JS -->
  <canvas class="ruled-lines" id="ruledCanvas"></canvas>

  <!-- Spiral holes -->
  <div class="holes" id="holes"></div>

  <!-- Header -->
  <div class="header">
    <h1>✏️ LetterDraw</h1>
    <span class="subject">Name: ___________________</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="shapes">Shapes</div>
    <div class="tab" data-tab="letters">Letters</div>
    <div class="tab" data-tab="numbers">Numbers</div>
  </div>

  <!-- Mode pills (per-tab content) -->
  <div class="mode-row" id="modeRow"></div>

  <!-- Settings -->
  <div class="settings-bar">
    <label class="toggle-label">
      <input type="checkbox" id="toggleGuide" checked>
      <span class="toggle-box"></span>
      Guide shape
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggleLines" checked>
      <span class="toggle-box"></span>
      Ruled lines
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggleOrder">
      <span class="toggle-box"></span>
      Stroke hints
    </label>
  </div>

  <!-- Canvas -->
  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="c"></canvas>
      <canvas id="ghostCanvas"></canvas>
    </div>
  </div>

  <!-- Char navigation (hidden for shapes) -->
  <div class="char-nav" id="charNav" style="display:none">
    <button class="nav-btn" id="prevChar">‹</button>
    <div class="char-display" id="charDisplay">A</div>
    <button class="nav-btn" id="nextChar">›</button>
  </div>

  <!-- Score -->
  <div class="score-section">
    <div class="score-big" id="scoreBig">—</div>
    <div class="score-breakdown" id="breakdown" style="display:none">
      <span>Shape <div class="sub-bar shape-bar" id="shapeBar" style="width:0px"></div> <span id="shapeScore">—</span></span>
      <span>Order <div class="sub-bar order-bar" id="orderBar" style="width:0px"></div> <span id="orderScore">—</span></span>
    </div>
    <div class="verdict" id="verdict"></div>
  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="action-btn" id="clearBtn">Clear</button>
    <button class="action-btn" id="undoBtn">Undo stroke</button>
    <button class="action-btn primary" id="doneBtn">Done ✓</button>
  </div>

  <!-- Stats -->
  <div class="stats-footer">
    <span>Attempts: <b id="attempts">0</b></span>
    <span>Best: <b id="best">—</b></span>
    <span>Streak: <b id="streak">0</b> ⭐</span>
  </div>
</div><!-- /notebook -->

<script src="script.js" defer></script>
</body>
</html>
