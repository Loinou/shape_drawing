<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LetterDraw</title>
<link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root {
  --paper:    #faf8f0;
  --line:     #aac4e8;
  --margin:   #f08080;
  --ink:      #1a237e;
  --pencil:   #444;
  --red:      #e53935;
  --green:    #2e7d32;
  --gold:     #f9a825;
  --shadow:   rgba(0,0,0,0.08);
  --line-h:   36px;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100dvh;
  background: #d6cfc0;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 29px, #c9c2b2 29px, #c9c2b2 30px),
    repeating-linear-gradient(transparent, transparent 29px, #c9c2b2 29px, #c9c2b2 30px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px 12px 24px;
  font-family: 'Patrick Hand', cursive;
}

/* ── NOTEBOOK PAGE ── */
.notebook {
  width: min(480px, 100%);
  background: var(--paper);
  border-radius: 4px 12px 12px 4px;
  box-shadow:
    -6px 0 0 #c8b89a,
    -12px 0 0 #d4c4aa,
    4px 4px 18px rgba(0,0,0,0.25),
    inset 0 0 40px rgba(200,190,160,0.15);
  position: relative;
  overflow: hidden;
  padding-bottom: 24px;
}

/* Red margin line */
.notebook::before {
  content: '';
  position: absolute;
  left: 52px;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--margin);
  opacity: 0.7;
  z-index: 1;
}

/* Horizontal ruled lines */
.ruled-lines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
.header {
  position: relative;
  z-index: 2;
  padding: 14px 20px 10px 64px;
  border-bottom: 2px solid var(--line);
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.header h1 {
  font-family: 'Schoolbell', cursive;
  font-size: 1.9rem;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.header .subject {
  font-size: 0.85rem;
  color: #888;
  border-bottom: 1px solid #ccc;
  padding-bottom: 1px;
  flex: 1;
}

/* ── TABS ── */
.tabs {
  position: relative;
  z-index: 2;
  display: flex;
  padding: 8px 12px 0 64px;
  gap: 2px;
  background: transparent;
}
.tab {
  font-family: 'Schoolbell', cursive;
  font-size: 0.8rem;
  padding: 4px 14px 3px;
  border: 1.5px solid #ccc;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  background: #ede9dd;
  color: #888;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.tab.active {
  background: var(--paper);
  color: var(--ink);
  border-color: var(--line);
  font-weight: bold;
}

/* ── MODE PILLS (shapes / letters / numbers) ── */
.mode-row {
  position: relative;
  z-index: 2;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 16px 6px 64px;
  border-top: 1.5px solid var(--line);
}
.pill {
  font-family: 'Patrick Hand', cursive;
  font-size: 0.75rem;
  padding: 3px 12px;
  border-radius: 20px;
  border: 1.5px solid #bbb;
  background: transparent;
  color: #777;
  cursor: pointer;
  transition: all 0.15s;
}
.pill.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}

/* ── SETTINGS BAR ── */
.settings-bar {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 5px 16px 8px 64px;
  font-size: 0.72rem;
  color: #888;
}
.toggle-label {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  user-select: none;
}
.toggle-label input { display:none; }
.toggle-box {
  width: 28px; height: 16px;
  border-radius: 8px;
  border: 1.5px solid #bbb;
  background: #ddd;
  position: relative;
  transition: background 0.2s;
}
.toggle-box::after {
  content:'';
  position: absolute;
  left: 2px; top: 2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: white;
  transition: left 0.2s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}
.toggle-label input:checked + .toggle-box { background: var(--ink); border-color: var(--ink); }
.toggle-label input:checked + .toggle-box::after { left: 14px; }

/* ── CANVAS AREA ── */
.canvas-section {
  position: relative;
  z-index: 2;
  margin: 0 16px 0 64px;
}
.canvas-wrap {
  position: relative;
  cursor: crosshair;
  touch-action: none;
  border-bottom: 2px solid var(--line);
}
canvas { display: block; }

/* Ghost overlay canvas */
#ghostCanvas {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
}

/* ── CHARACTER NAV ── */
.char-nav {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 10px 16px;
}
.nav-btn {
  font-family: 'Schoolbell', cursive;
  font-size: 1.1rem;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid #bbb;
  background: transparent;
  color: #888;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.nav-btn:hover { border-color: var(--ink); color: var(--ink); }
.char-display {
  font-family: 'Schoolbell', cursive;
  font-size: 2.2rem;
  color: var(--ink);
  min-width: 80px;
  text-align: center;
  border-bottom: 2px dashed var(--line);
  padding-bottom: 2px;
}

/* ── SCORE SECTION ── */
.score-section {
  position: relative;
  z-index: 2;
  padding: 6px 16px 4px 64px;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.score-big {
  font-family: 'Schoolbell', cursive;
  font-size: 2.4rem;
  color: var(--pencil);
  line-height: 1;
  min-width: 80px;
}
.score-big.s-excellent { color: var(--green); }
.score-big.s-good      { color: #1976d2; }
.score-big.s-ok        { color: var(--gold); }
.score-big.s-bad       { color: var(--red); }

.score-breakdown {
  display: flex;
  flex-direction: column;
  gap: 1px;
  font-size: 0.7rem;
  color: #999;
}
.score-breakdown span { display: flex; gap: 4px; align-items: center; }
.sub-bar {
  display: inline-block;
  height: 5px;
  border-radius: 3px;
  background: var(--line);
  transition: width 0.4s ease;
}
.sub-bar.shape-bar { background: #1976d2; }
.sub-bar.order-bar { background: var(--gold); }

.verdict {
  font-family: 'Schoolbell', cursive;
  font-size: 1rem;
  color: var(--red);
  transform: rotate(-1.5deg);
  display: inline-block;
  margin-left: 4px;
}

/* ── STATS FOOTER ── */
.stats-footer {
  position: relative;
  z-index: 2;
  padding: 4px 16px 4px 64px;
  font-size: 0.7rem;
  color: #bbb;
  border-top: 1px solid #e8e0d0;
  display: flex;
  gap: 18px;
}
.stats-footer b { color: #999; }

/* ── ACTION BUTTONS ── */
.action-row {
  position: relative;
  z-index: 2;
  padding: 10px 16px 4px 64px;
  display: flex;
  gap: 8px;
}
.action-btn {
  font-family: 'Patrick Hand', cursive;
  font-size: 0.75rem;
  padding: 5px 16px;
  border-radius: 4px;
  border: 1.5px solid #bbb;
  background: transparent;
  color: #777;
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover { border-color: var(--ink); color: var(--ink); }
.action-btn.primary { background: var(--ink); color: white; border-color: var(--ink); }

/* Stroke order dots */
.stroke-hint {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(200,50,50,0.5);
  width: 18px; height: 18px;
  margin: -9px 0 0 -9px;
  pointer-events: none;
  font-family: 'Patrick Hand', cursive;
  font-size: 0.6rem;
  display: flex; align-items: center; justify-content: center;
  color: rgba(200,50,50,0.7);
  background: rgba(255,255,255,0.8);
  z-index: 5;
}

@keyframes pop {0%,100%{transform:scale(1) rotate(-1.5deg)}50%{transform:scale(1.12) rotate(-1.5deg)}}
@keyframes wobble {0%{transform:rotate(0)}25%{transform:rotate(-2deg)}75%{transform:rotate(2deg)}100%{transform:rotate(0)}}
.pop   { animation: pop    0.35s ease; }
.wobble{ animation: wobble 0.4s ease; }

/* Spiral binding holes */
.holes {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 44px;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  align-items: center;
  padding: 20px 0;
}
.hole {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #c8b89a, #b0a080);
  box-shadow: inset 0 2px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(255,255,255,0.4);
}
</style>
</head>
<body>

<div class="notebook" id="notebook">
  <!-- Ruled lines drawn by JS -->
  <canvas class="ruled-lines" id="ruledCanvas"></canvas>

  <!-- Spiral holes -->
  <div class="holes" id="holes"></div>

  <!-- Header -->
  <div class="header">
    <h1>✏️ LetterDraw</h1>
    <span class="subject">Name: ___________________</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="shapes">Shapes</div>
    <div class="tab" data-tab="letters">Letters</div>
    <div class="tab" data-tab="numbers">Numbers</div>
  </div>

  <!-- Mode pills (per-tab content) -->
  <div class="mode-row" id="modeRow"></div>

  <!-- Settings -->
  <div class="settings-bar">
    <label class="toggle-label">
      <input type="checkbox" id="toggleGuide" checked>
      <span class="toggle-box"></span>
      Guide shape
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggleLines" checked>
      <span class="toggle-box"></span>
      Ruled lines
    </label>
    <label class="toggle-label">
      <input type="checkbox" id="toggleOrder">
      <span class="toggle-box"></span>
      Stroke hints
    </label>
  </div>

  <!-- Canvas -->
  <div class="canvas-section">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="c"></canvas>
      <canvas id="ghostCanvas"></canvas>
    </div>
  </div>

  <!-- Char navigation (hidden for shapes) -->
  <div class="char-nav" id="charNav" style="display:none">
    <button class="nav-btn" id="prevChar">‹</button>
    <div class="char-display" id="charDisplay">A</div>
    <button class="nav-btn" id="nextChar">›</button>
  </div>

  <!-- Score -->
  <div class="score-section">
    <div class="score-big" id="scoreBig">—</div>
    <div class="score-breakdown" id="breakdown" style="display:none">
      <span>Shape <div class="sub-bar shape-bar" id="shapeBar" style="width:0px"></div> <span id="shapeScore">—</span></span>
      <span>Order <div class="sub-bar order-bar" id="orderBar" style="width:0px"></div> <span id="orderScore">—</span></span>
    </div>
    <div class="verdict" id="verdict"></div>
  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="action-btn" id="clearBtn">Clear</button>
    <button class="action-btn" id="undoBtn">Undo stroke</button>
    <button class="action-btn primary" id="doneBtn">Done ✓</button>
  </div>

  <!-- Stats -->
  <div class="stats-footer">
    <span>Attempts: <b id="attempts">0</b></span>
    <span>Best: <b id="best">—</b></span>
    <span>Streak: <b id="streak">0</b> ⭐</span>
  </div>

</div><!-- /notebook -->

<script>
// ═══════════════════════════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════════════════════════
const TABS = {
  shapes:  { modes: ['Circle','Triangle','Square','Star'], type:'shape' },
  letters: { modes: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''), type:'char' },
  numbers: { modes: '0123456789'.split(''), type:'char' }
};

let state = {
  tab:        'shapes',
  modeIdx:    0,
  showGuide:  true,
  showLines:  true,
  showOrder:  false,
  drawing:    false,
  strokes:    [],       // completed strokes (each: array of {x,y})
  current:    [],       // points in current stroke
  attempts:   0,
  best:       {},
  streak:     0,
  lastGood:   false,
};

// ═══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════
const canvas      = document.getElementById('c');
const ghostCanvas = document.getElementById('ghostCanvas');
const ruledCanvas = document.getElementById('ruledCanvas');
const ctx         = canvas.getContext('2d');
const gctx        = ghostCanvas.getContext('2d');
const rctx        = ruledCanvas.getContext('2d');
const notebook    = document.getElementById('notebook');
let SZ = 320; // canvas height, width = notebook inner width

function setupCanvases() {
  const nw = notebook.offsetWidth;
  const cw = nw - 64 - 32; // minus margin offset and right padding
  SZ = Math.min(cw, 340);
  const ch = Math.round(SZ * 0.72);
  canvas.width      = ghostCanvas.width      = cw;
  canvas.height     = ghostCanvas.height     = ch;
  canvas.style.width= ghostCanvas.style.width= cw+'px';

  // Ruled canvas covers whole notebook
  ruledCanvas.width  = nw;
  ruledCanvas.height = notebook.offsetHeight || 900;
  ruledCanvas.style.width  = nw+'px';
  ruledCanvas.style.height = ruledCanvas.height+'px';

  // Spiral holes
  const holes = document.getElementById('holes');
  holes.innerHTML = '';
  const n = Math.floor(ruledCanvas.height / 60);
  for (let i=0; i<n; i++) { const d=document.createElement('div'); d.className='hole'; holes.appendChild(d); }

  drawRuled();
  drawGhost();
}

function drawRuled() {
  const w = ruledCanvas.width, h = ruledCanvas.height;
  rctx.clearRect(0,0,w,h);
  if (!state.showLines) return;
  const LINE_H = 36;
  rctx.strokeStyle = 'rgba(170,196,232,0.55)';
  rctx.lineWidth = 1;
  for (let y = LINE_H; y < h; y += LINE_H) {
    rctx.beginPath(); rctx.moveTo(0,y); rctx.lineTo(w,y); rctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════════
//  TABS & MODES
// ═══════════════════════════════════════════════════════════════
function currentModes() { return TABS[state.tab].modes; }
function currentMode()  { return currentModes()[state.modeIdx]; }
function currentType()  { return TABS[state.tab].type; }

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelector('.tab.active').classList.remove('active');
    t.classList.add('active');
    state.tab = t.dataset.tab;
    state.modeIdx = 0;
    clearAll();
    buildModeRow();
    updateCharNav();
    updateBestDisplay();
  });
});

function buildModeRow() {
  const row = document.getElementById('modeRow');
  row.innerHTML = '';
  const modes = currentModes();
  if (currentType() === 'shape') {
    modes.forEach((m,i) => {
      const p = document.createElement('button');
      p.className = 'pill' + (i===state.modeIdx?' active':'');
      p.textContent = m;
      p.addEventListener('click', () => {
        document.querySelector('.pill.active')?.classList.remove('active');
        p.classList.add('active');
        state.modeIdx = i;
        clearAll();
        drawGhost();
        updateBestDisplay();
      });
      row.appendChild(p);
    });
  }
  // For letters/numbers: mode row shows nothing (use char nav)
}

function updateCharNav() {
  const nav = document.getElementById('charNav');
  if (currentType()==='char') {
    nav.style.display='flex';
    document.getElementById('charDisplay').textContent = currentMode();
  } else {
    nav.style.display='none';
  }
}

document.getElementById('prevChar').addEventListener('click', () => {
  const n = currentModes().length;
  state.modeIdx = (state.modeIdx - 1 + n) % n;
  document.getElementById('charDisplay').textContent = currentMode();
  clearAll();
  updateBestDisplay();
});
document.getElementById('nextChar').addEventListener('click', () => {
  state.modeIdx = (state.modeIdx + 1) % currentModes().length;
  document.getElementById('charDisplay').textContent = currentMode();
  clearAll();
  updateBestDisplay();
});

// ═══════════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════════
document.getElementById('toggleGuide').addEventListener('change', e => {
  state.showGuide = e.target.checked; drawGhost();
});
document.getElementById('toggleLines').addEventListener('change', e => {
  state.showLines = e.target.checked; drawRuled();
});
document.getElementById('toggleOrder').addEventListener('change', e => {
  state.showOrder = e.target.checked; drawGhost();
});

// ═══════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return { x: s.clientX - r.left, y: s.clientY - r.top };
}

canvas.addEventListener('mousedown',  e => startStroke(e));
canvas.addEventListener('mousemove',  e => continueStroke(e));
canvas.addEventListener('mouseup',    e => endStroke());
canvas.addEventListener('mouseleave', e => { if(state.drawing) endStroke(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); startStroke(e); }, {passive:false});
canvas.addEventListener('touchmove',  e => { e.preventDefault(); continueStroke(e); }, {passive:false});
canvas.addEventListener('touchend',   e => { e.preventDefault(); endStroke(); });

function startStroke(e) {
  state.drawing = true;
  state.current = [];
  const p = getPos(e);
  state.current.push(p);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = '#1a237e';
  ctx.lineWidth   = 2.8;
  ctx.lineJoin    = ctx.lineCap = 'round';
}
function continueStroke(e) {
  if (!state.drawing) return;
  const p = getPos(e);
  state.current.push(p);
  ctx.lineTo(p.x, p.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
}
function endStroke() {
  if (!state.drawing) return;
  state.drawing = false;
  if (state.current.length < 3) return;
  state.strokes.push([...state.current]);
  state.current = [];
}

// ═══════════════════════════════════════════════════════════════
//  CLEAR / UNDO
// ═══════════════════════════════════════════════════════════════
document.getElementById('clearBtn').addEventListener('click', clearAll);
document.getElementById('undoBtn').addEventListener('click', () => {
  if (state.strokes.length > 0) {
    state.strokes.pop();
    redrawStrokes();
    resetScoreDisplay();
  }
});
document.getElementById('doneBtn').addEventListener('click', analyze);

function clearAll() {
  state.strokes = []; state.current = [];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGhost();
  resetScoreDisplay();
}
function resetScoreDisplay() {
  document.getElementById('scoreBig').textContent = '—';
  document.getElementById('scoreBig').className   = 'score-big';
  document.getElementById('verdict').textContent  = '';
  document.getElementById('breakdown').style.display = 'none';
}
function redrawStrokes() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  state.strokes.forEach(stroke => {
    if (stroke.length < 2) return;
    ctx.beginPath(); ctx.moveTo(stroke[0].x, stroke[0].y);
    ctx.strokeStyle='#1a237e'; ctx.lineWidth=2.8; ctx.lineJoin=ctx.lineCap='round';
    for (let i=1;i<stroke.length;i++) { ctx.lineTo(stroke[i].x,stroke[i].y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(stroke[i].x,stroke[i].y); }
  });
}

// ═══════════════════════════════════════════════════════════════
//  GHOST / GUIDE DRAWING
// ═══════════════════════════════════════════════════════════════
function drawGhost() {
  const w = ghostCanvas.width, h = ghostCanvas.height;
  gctx.clearRect(0,0,w,h);
  if (!state.showGuide) return;

  gctx.save();
  gctx.strokeStyle = 'rgba(160,180,220,0.45)';
  gctx.fillStyle   = 'rgba(160,180,220,0.08)';
  gctx.lineWidth   = 1.5;
  gctx.setLineDash([5,7]);

  const mode = currentMode();
  const cx=w/2, cy=h/2;

  if (currentType()==='shape') {
    drawShapeGuide(gctx, mode, cx, cy, Math.min(w,h)*0.35);
  } else {
    drawCharGuide(gctx, mode, cx, cy, h*0.72);
  }

  gctx.setLineDash([]);
  gctx.restore();

  // Stroke order hints
  if (state.showOrder && currentType()==='char') {
    drawStrokeOrderHints(mode, cx, cy, h*0.72);
  }
}

function drawShapeGuide(ctx, shape, cx, cy, r) {
  ctx.beginPath();
  if (shape==='Circle') {
    ctx.arc(cx,cy,r,0,Math.PI*2);
  } else if (shape==='Triangle') {
    polyPath(ctx, cx,cy,r,3,-Math.PI/2);
  } else if (shape==='Square') {
    polyPath(ctx, cx,cy,r,4,Math.PI/4);
  } else if (shape==='Star') {
    starPath(ctx, cx,cy,r,r*0.382,5,-Math.PI/2);
  }
  ctx.stroke();
  ctx.fill();
}

function polyPath(ctx, cx,cy,r,n,rot) {
  ctx.beginPath();
  for (let i=0;i<=n;i++) { const a=rot+(2*Math.PI*i)/n; i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a)); }
}
function starPath(ctx, cx,cy,ro,ri,n,rot) {
  ctx.beginPath();
  for (let i=0;i<=2*n;i++) { const a=rot+(Math.PI*i)/n, r=i%2===0?ro:ri; i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a)); }
}

// Fix minus signs that might be interpreted as subtraction
// (All coords already use the literal minus sign from source)

function charToCanvas(txty, cx, cy, scale) {
  // txty: [tx, ty] normalised -1..+1
  return { x: cx + txty[0]*scale*0.48, y: cy + txty[1]*scale*0.48 };
}

function drawCharGuide(ctx, ch, cx, cy, scale) {
  const def = CHAR_DEFS[ch];
  if (!def) return;
  def.strokes.forEach((stroke, si) => {
    ctx.beginPath();
    stroke.forEach((pt, i) => {
      const {x,y} = charToCanvas(pt, cx, cy, scale);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
}

function drawStrokeOrderHints(ch, cx, cy, scale) {
  // Remove existing hints
  document.querySelectorAll('.stroke-hint').forEach(e=>e.remove());
  const def = CHAR_DEFS[ch];
  if (!def) return;
  const wrap = document.getElementById('canvasWrap');
  def.strokes.forEach((stroke, si) => {
    const pt0 = charToCanvas(stroke[0], cx, cy, scale);
    const hint = document.createElement('div');
    hint.className = 'stroke-hint';
    hint.textContent = si+1;
    hint.style.left = pt0.x + 'px';
    hint.style.top  = pt0.y + 'px';
    wrap.appendChild(hint);
  });
}

// ═══════════════════════════════════════════════════════════════
//  GEOMETRY HELPERS (reused from shapes module)
// ═══════════════════════════════════════════════════════════════
function uniformResample(pts, n) {
  if (pts.length < 2) return pts;
  const len=[0]; let total=0;
  for(let i=1;i<pts.length;i++){total+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);len.push(total);}
  const out=[];
  for(let i=0;i<n;i++){
    const target=(i/(n-1))*total;
    let lo=0,hi=pts.length-1;
    while(lo<hi-1){const mid=(lo+hi)>>1;if(len[mid]<=target)lo=mid;else hi=mid;}
    const t=len[hi]===len[lo]?0:(target-len[lo])/(len[hi]-len[lo]);
    out.push({x:pts[lo].x*(1-t)+pts[hi].x*t,y:pts[lo].y*(1-t)+pts[hi].y*t});
  }
  return out;
}

function ptSegDist(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
  if(l2===0)return Math.hypot(p.x-a.x,p.y-a.y);
  const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/l2));
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}
function minDistToEdges(p,verts){
  let d=Infinity;
  for(let i=0;i<verts.length;i++)d=Math.min(d,ptSegDist(p,verts[i],verts[(i+1)%verts.length]));
  return d;
}
function goldenMin(f,a,b,n){
  const phi=(Math.sqrt(5)-1)/2;
  let x1=b-phi*(b-a),x2=a+phi*(b-a),f1=f(x1),f2=f(x2);
  for(let i=0;i<n;i++){if(f1<f2){b=x2;x2=x1;f2=f1;x1=b-phi*(b-a);f1=f(x1);}else{a=x1;x1=x2;f1=f2;x2=a+phi*(b-a);f2=f(x2);}}
  return (a+b)/2;
}

// ── CIRCLE FIT ──────────────────────────────────────────────────
function fitCircle(pts){
  const n=pts.length;
  let mx=0,my=0;pts.forEach(p=>{mx+=p.x;my+=p.y;});mx/=n;my/=n;
  let Sxx=0,Syy=0,Sxy=0,Sx=0,Sy=0,Szx=0,Szy=0;
  pts.forEach(p=>{const x=p.x-mx,y=p.y-my,z=x*x+y*y;Sxx+=x*x;Syy+=y*y;Sxy+=x*y;Sx+=x;Sy+=y;Szx+=z*x;Szy+=z*y;});
  const b1=Szx,b2=Szy,b3=pts.reduce((s,p)=>{const x=p.x-mx,y=p.y-my;return s+x*x+y*y;},0);
  const a11=Sxx,a12=Sxy,a13=Sx,a21=Sxy,a22=Syy,a23=Sy,a31=Sx,a32=Sy,a33=n;
  const det=a11*(a22*a33-a23*a32)-a12*(a21*a33-a23*a31)+a13*(a21*a32-a22*a31);
  let ecx,ecy;
  if(Math.abs(det)<1e-8){ecx=mx;ecy=my;}
  else{
    const A=(b1*(a22*a33-a23*a32)-a12*(b2*a33-a23*b3)+a13*(b2*a32-a22*b3))/det;
    const B=(a11*(b2*a33-a23*b3)-b1*(a21*a33-a23*a31)+a13*(a21*b3-b2*a31))/det;
    ecx=A/2+mx;ecy=B/2+my;
  }
  const radii=pts.map(p=>Math.hypot(p.x-ecx,p.y-ecy));
  const r=radii.reduce((s,ri)=>s+ri,0)/n;
  const rmse=Math.sqrt(radii.reduce((s,ri)=>s+(ri-r)**2,0)/n);
  const d=Math.hypot(pts[0].x-pts[pts.length-1].x,pts[0].y-pts[pts.length-1].y);
  const closureFrac=Math.max(0,d/r-0.2);
  const circScore=Math.max(0,1-(rmse/r)/0.25);
  const closureAdj=Math.max(0,1-closureFrac*0.6);
  return [Math.round(circScore*closureAdj*100), {cx:ecx, cy:ecy, r}];
}

// ── POLYGON FIT ──────────────────────────────────────────────────
function defaultRot(sh){return{triangle:-Math.PI/2,square:Math.PI/4,star:-Math.PI/2}[sh]??0;}
function shapeVerts(cx,cy,r,sh,rot){
  if(sh==='Triangle')return Array.from({length:3},(_,i)=>{const a=rot+(2*Math.PI*i)/3;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};});
  if(sh==='Square')  return Array.from({length:4},(_,i)=>{const a=rot+(2*Math.PI*i)/4;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};});
  if(sh==='Star'){const pts=[];for(let i=0;i<10;i++){const a=rot+(Math.PI*i)/5,ri=i%2===0?r:r*0.382;pts.push({x:cx+ri*Math.cos(a),y:cy+ri*Math.sin(a)});}return pts;}
}

function fitPolygon(pts,sh){
  let cx=0,cy=0;pts.forEach(p=>{cx+=p.x;cy+=p.y;});cx/=pts.length;cy/=pts.length;
  const local=pts.map(p=>({x:p.x-cx,y:p.y-cy}));
  const dists=local.map(p=>Math.hypot(p.x,p.y));
  const rMean=dists.reduce((a,b)=>a+b,0)/dists.length;
  const base=defaultRot(sh.toLowerCase());
  const symmetry={triangle:3,square:4,star:5}[sh.toLowerCase()];
  const period=sh.toLowerCase()==='star'?Math.PI/5:(2*Math.PI/symmetry);
  const cost=(s,rot)=>{const v=shapeVerts(0,0,s,sh,rot);let t=0;local.forEach(p=>{t+=minDistToEdges(p,v);});return t/local.length;};
  let bestCost=Infinity,bestRot=base,bestS=rMean;
  for(let i=0;i<=120;i++){
    const rot=base+(i/120)*period-period/2;
    const s=goldenMin(s=>cost(s,rot),rMean*0.3,rMean*2.5,20);
    const c=cost(s,rot);
    if(c<bestCost){bestCost=c;bestRot=rot;bestS=s;}
  }
  const rr=period/120;
  bestRot=goldenMin(rot=>{const s=goldenMin(s=>cost(s,rot),rMean*0.3,rMean*2.5,15);return cost(s,rot);},bestRot-rr,bestRot+rr,25);
  bestS=goldenMin(s=>cost(s,bestRot),rMean*0.3,rMean*2.5,30);
  const finalCost=cost(bestS,bestRot);
  const score=Math.round(Math.max(0,Math.min(100,(1-finalCost/(bestS*0.25))*100)));
  return [score, {cx, cy, r:bestS, rot:bestRot}];
}

// ═══════════════════════════════════════════════════════════════
//  CHARACTER SCORING
// ═══════════════════════════════════════════════════════════════
function scoreChar(ch, strokes) {
  const def = CHAR_DEFS[ch];
  if (!def) return { total:0, shape:0, order:0 };

  const h = canvas.height;

  const allPts = strokes.flat();
  if (allPts.length === 0) return { total:0, shape:0, order:0 };

  // ── FIT IDEAL CHARACTER TO USER'S DRAWN POSITION & SCALE ──
  // We need to find the transformation (translate + uniform scale) that maps
  // the ideal character definition onto the user's drawing.
  //
  // The key insight: charToCanvas maps normalised coords [-1,+1] to canvas coords
  // via:  canvas_x = cx + tx * scale * 0.48
  // So the bounding box of canvas points is proportional to the bounding box
  // of the normalised definition, scaled by (scale * 0.48).
  //
  // Strategy: compute bounding boxes of BOTH the drawn strokes and the ideal
  // definition (in normalised space), then solve for the scale and offset that
  // maps ideal→drawn. This is exact and position-independent.

  // Step 1: bounding box of the user's drawing (canvas coords)
  let dMinX=Infinity,dMaxX=-Infinity,dMinY=Infinity,dMaxY=-Infinity;
  allPts.forEach(p=>{
    if(p.x<dMinX)dMinX=p.x; if(p.x>dMaxX)dMaxX=p.x;
    if(p.y<dMinY)dMinY=p.y; if(p.y>dMaxY)dMaxY=p.y;
  });
  const drawnCx = (dMinX+dMaxX)/2;
  const drawnCy = (dMinY+dMaxY)/2;
  const drawnW  = Math.max(dMaxX-dMinX, h*0.05); // avoid degenerate
  const drawnH  = Math.max(dMaxY-dMinY, h*0.05);

  // Step 2: bounding box of the ideal definition (normalised coords, flat list)
  const normPts = def.strokes.flat();
  let nMinX=Infinity,nMaxX=-Infinity,nMinY=Infinity,nMaxY=-Infinity;
  normPts.forEach(([tx,ty])=>{
    if(tx<nMinX)nMinX=tx; if(tx>nMaxX)nMaxX=tx;
    if(ty<nMinY)nMinY=ty; if(ty>nMaxY)nMaxY=ty;
  });
  const normW = Math.max(nMaxX-nMinX, 0.01);
  const normH = Math.max(nMaxY-nMinY, 0.01);

  // Step 3: compute scale so ideal bounding box matches drawn bounding box.
  // We use the larger dimension ratio to preserve aspect ratio (uniform scale).
  // charToCanvas: canvas_x = cx + tx * scale * 0.48
  // So canvas_span_x = normW * scale * 0.48  →  scale = drawnW / (normW * 0.48)
  // We pick whichever axis gives the better fit (max to avoid clipping).
  const scaleX = drawnW / (normW * 0.48);
  const scaleY = drawnH / (normH * 0.48);
  const scale  = Math.max(scaleX, scaleY);

  // Step 4: centre of the ideal bbox in normalised space → offset
  const normCx = (nMinX+nMaxX)/2;
  const normCy = (nMinY+nMaxY)/2;
  // After applying charToCanvas at (drawnCx, drawnCy, scale), the ideal centre lands at:
  // canvas_x = drawnCx + normCx * scale * 0.48  ← which may not equal drawnCx
  // We want the centres to coincide, so we shift drawnCx by -normCx*scale*0.48
  const adjCx = drawnCx - normCx * scale * 0.48;
  const adjCy = drawnCy - normCy * scale * 0.48;

  // Build ideal stroke polylines fitted to the user's position and scale
  const idealStrokes = def.strokes.map(s =>
    s.map(pt => charToCanvas(pt, adjCx, adjCy, scale))
  );

  // Resample all strokes
  const drawn = strokes.map(s => uniformResample(s, 40));
  const ideal = idealStrokes.map(s => uniformResample(s, 40));

  if (drawn.length === 0) return { total:0, shape:0, order:0 };

  // ── SHAPE SCORE ──
  // For each drawn stroke, find the nearest ideal stroke (by Hausdorff-ish mean dist)
  // and compute fit quality. We use a greedy assignment.
  const nIdeal = ideal.length;
  const nDrawn = drawn.length;

  // Distance matrix: drawn[i] vs ideal[j]
  const distMatrix = drawn.map(ds =>
    ideal.map(is => meanStrokeDist(ds, is))
  );

  // Greedy assignment (sufficient for ≤5 strokes)
  const assigned = new Array(nIdeal).fill(-1);
  const usedDrawn = new Set();
  for (let j=0; j<nIdeal; j++) {
    let bestD=Infinity, bestI=-1;
    for (let i=0; i<nDrawn; i++) {
      if (usedDrawn.has(i)) continue;
      if (distMatrix[i][j] < bestD) { bestD=distMatrix[i][j]; bestI=i; }
    }
    if (bestI>=0) { assigned[j]=bestI; usedDrawn.add(bestI); }
  }

  // Score each assigned stroke
  // Normalise distance by a reference scale (10% of canvas height = decent)
  const refDist = h * 0.10;
  let totalShapeScore = 0;
  let coveredStrokes = 0;
  assigned.forEach((di, ji) => {
    if (di < 0) return;
    const d = distMatrix[di][ji];
    const s = Math.max(0, 1 - d/refDist);
    totalShapeScore += s;
    coveredStrokes++;
  });
  // Penalise missing strokes
  const coverageFraction = coveredStrokes / nIdeal;
  const shapeScore = Math.round((totalShapeScore/nIdeal) * 100);

  // ── ORDER SCORE ──
  // Check: are the drawn strokes in the correct sequence?
  // We compare the sequence of ideal-stroke assignments to [0,1,2,...]
  const sequence = assigned.filter(x=>x>=0);
  let orderScore = 100;
  if (nIdeal > 1) {
    let correctTransitions = 0;
    for (let j=1; j<nIdeal; j++) {
      if (assigned[j] > assigned[j-1]) correctTransitions++;
    }
    // Partial credit: fraction of correct consecutive orderings
    orderScore = nIdeal===1 ? 100 : Math.round((correctTransitions/(nIdeal-1))*100);
  }

  // Extra penalty: drawn strokes in reverse direction?
  let directionPenalty = 0;
  assigned.forEach((di,ji) => {
    if (di<0) return;
    const dStroke = drawn[di];
    const iStroke = ideal[ji];
    const fwdDist = meanStrokeDist(dStroke, iStroke);
    const revDist = meanStrokeDist([...dStroke].reverse(), iStroke);
    if (revDist < fwdDist * 0.7) directionPenalty += 15; // drew backwards
  });
  orderScore = Math.max(0, orderScore - directionPenalty);

  // Combined
  const total = Math.round(shapeScore * 0.7 + orderScore * 0.3);
  return { total, shape: shapeScore, order: orderScore };
}

function meanStrokeDist(a, b) {
  // Mean of min distances from each point in a to nearest point in b
  let sum = 0;
  a.forEach(p => {
    let minD = Infinity;
    b.forEach(q => { const d=Math.hypot(p.x-q.x,p.y-q.y); if(d<minD)minD=d; });
    sum += minD;
  });
  return sum/a.length;
}

// ═══════════════════════════════════════════════════════════════
//  ANALYZE (called on Done button or auto after expected strokes)
// ═══════════════════════════════════════════════════════════════
function analyze() {
  if (state.strokes.length === 0) return;

  let score, shapeScore=null, orderScore=null, fitted=null;

  if (currentType()==='shape') {
    const allPts = state.strokes.flat();
    const resampled = uniformResample(allPts, 200);
    const mode = currentMode();
    if (mode==='Circle') {
      [score, fitted] = fitCircle(resampled);
      fitted.type = 'circle';
    } else {
      [score, fitted] = fitPolygon(resampled, mode);
      fitted.type = mode; // 'Triangle', 'Square', 'Star'
    }
  } else {
    const result = scoreChar(currentMode(), state.strokes);
    score      = result.total;
    shapeScore = result.shape;
    orderScore = result.order;
  }

  score = Math.max(0, Math.min(100, score));

  // Update stats
  state.attempts++;
  document.getElementById('attempts').textContent = state.attempts;

  const key = currentMode();
  const prev = state.best[key] ?? 0;
  if (score > prev) { state.best[key]=score; }
  updateBestDisplay();

  if (score >= 75) { state.lastGood=true; state.streak++; }
  else { state.lastGood=false; state.streak=0; }
  document.getElementById('streak').textContent = state.streak;

  // Display score
  const el = document.getElementById('scoreBig');
  el.textContent = score+'%';
  el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),350);

  const grades=[
    [90,'s-excellent',['Perfect! ⭐','Amazing! 🌟','Superstar! ✨']],
    [75,'s-good',     ['Great job! 👍','Well done!','Nice work!']],
    [55,'s-ok',       ['Keep going! 💪','Almost there!','Not bad!']],
    [35,'s-bad',      ['Try again!','Keep practicing!','You can do it!']],
    [0, 's-bad',      ['Don\'t give up!','Practice makes perfect!','Try once more!']],
  ];
  const [,cls,msgs]=grades.find(([m])=>score>=m);
  el.className='score-big '+cls;
  const verd=document.getElementById('verdict');
  verd.textContent=msgs[Math.floor(Math.random()*msgs.length)];
  verd.classList.add('pop');
  setTimeout(()=>verd.classList.remove('pop'),350);

  // Sub-scores
  if (shapeScore!==null) {
    document.getElementById('breakdown').style.display='flex';
    document.getElementById('shapeScore').textContent=shapeScore+'%';
    document.getElementById('orderScore').textContent=orderScore+'%';
    document.getElementById('shapeBar').style.width=(shapeScore*0.8)+'px';
    document.getElementById('orderBar').style.width=(orderScore*0.8)+'px';
  } else {
    document.getElementById('breakdown').style.display='none';
  }

  // Clear the drawn strokes now that the rating is displayed
  state.strokes = [];
  state.current = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw fitted shape overlay for shapes — pass the fitted params we already computed
  if (currentType()==='shape' && fitted) {
    drawFittedOverlay(fitted);
  }
}

function drawFittedOverlay(fitted) {
  ctx.save();
  ctx.strokeStyle = 'rgba(100,140,200,0.4)';
  ctx.lineWidth   = 1.5;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();

  if (fitted.type === 'circle') {
    ctx.arc(fitted.cx, fitted.cy, fitted.r, 0, Math.PI*2);
    ctx.stroke();
    // Small dot at the fitted center
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(100,140,200,0.3)';
    ctx.beginPath(); ctx.arc(fitted.cx, fitted.cy, 3, 0, Math.PI*2); ctx.fill();
  } else {
    // Polygon or star: use the fitted cx, cy, r and best rotation
    const verts = shapeVerts(fitted.cx, fitted.cy, fitted.r, fitted.type, fitted.rot);
    if (verts && verts.length > 0) {
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i=1; i<verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
      ctx.closePath();
      ctx.stroke();
    }
  }

  ctx.setLineDash([]);
  ctx.restore();
}

function updateBestDisplay() {
  const key = currentMode();
  const b = state.best[key];
  document.getElementById('best').textContent = b!=null ? b+'%' : '—';
}

buildModeRow();
updateCharNav();
window.addEventListener('resize', ()=>{ setupCanvases(); redrawStrokes(); });
// Wait for fonts + layout
setTimeout(setupCanvases, 120);
</script>
